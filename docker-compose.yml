services:
  postgres:
    image: postgres:17-alpine
    container_name: terkis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: terkis-cms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d terkis-cms']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
